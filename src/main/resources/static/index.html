<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Vinayalankara Dahampasala - Student Management</title>
    <link rel="stylesheet" href="css/styles.css">    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Centered Hero Styles */
        .hero-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 100px); /* Adjusting for top bar height */
            text-align: center;
            color: #2c3e50;
        }

        .hero-wheel {
            font-size: 120px;
            color: #d4af37; /* Gold color for the Dharma wheel */
            margin-bottom: 20px;
            animation: rotateWheel 20s linear infinite;
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: #64748b;
            margin-top: 10px;
            font-weight: 300;
        }

        @keyframes rotateWheel {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Adjusting main content to handle centered display */
        .main-content {
            background: #f8fafc;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Unified Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-dharmachakra"></i>
                <h2 class="brand-text">Sri Vinayalankara Dahampasala</h2>
            </div>
            <ul>
                <li><a href="index.html" id="dashNav" class="active"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="html/studentManagementMain.html" id="manageNavBtn"><i class="fas fa-user-graduate"></i> Manage Students</a></li>
                <li><a href="html/manageOther.html" id="settingsNav"><i class="fas fa-th-list"></i> Manage Other</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <!-- Centralized Hero Section -->
            <div class="hero-container">
                <i class="fas fa-dharmachakra hero-wheel"></i>
                <h1 class="hero-title">Sri Vinayalankara Dahampasala</h1>
                <p class="hero-subtitle">Student Enrollment & Administration System</p>
            </div>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
